<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backoffice Titre de Séjour - Madagascar</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/formulaire-dossier.css}">
    <style>
        body {
            background-color: #f5f7fa;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
        }

        /* Navbar verticale */
        .sidebar {
            width: 260px;
            background: linear-gradient(180deg, #1a3a52 0%, #2c3e50 100%);
            min-height: 100vh;
            padding: 0;
            position: fixed;
            left: 0;
            top: 0;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.1);
            z-index: 1000;
        }

        .sidebar-header {
            padding: 30px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        .sidebar-header h5 {
            color: white;
            margin: 10px 0 5px;
            font-weight: 700;
            font-size: 1rem;
        }

        .sidebar-header .flag {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .sidebar-header p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.8rem;
            margin: 0;
        }

        .sidebar-nav {
            padding: 20px 0;
            list-style: none;
            margin: 0;
        }

        .sidebar-nav li {
            margin: 0;
        }

        .sidebar-nav a {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 20px;
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            transition: all 0.3s ease;
            border-left: 3px solid transparent;
            font-weight: 500;
            font-size: 0.95rem;
        }

        .sidebar-nav a:hover {
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
            border-left-color: #3498db;
        }

        .sidebar-nav a.active {
            background-color: rgba(52, 152, 219, 0.15);
            color: #3498db;
            border-left-color: #3498db;
        }

        .sidebar-nav i {
            font-size: 1.1rem;
            width: 24px;
            text-align: center;
        }

        /* Contenu principal */
        .main-content {
            margin-left: 260px;
            width: calc(100% - 260px);
            padding: 40px;
        }

        .welcome-container {
            background: white;
            border-radius: 12px;
            padding: 60px 50px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            text-align: center;
            max-width: 600px;
            margin: 80px auto;
        }

        .welcome-container .flag {
            font-size: 4rem;
            margin-bottom: 25px;
        }

        .welcome-container h1 {
            color: #1a3a52;
            margin-bottom: 10px;
            font-weight: 700;
            font-size: 2rem;
        }

        .welcome-container h2 {
            font-size: 1.2rem;
            color: #34495e;
            margin-bottom: 15px;
            font-weight: 500;
        }

        .welcome-container p {
            color: #7f8c8d;
            margin-bottom: 40px;
            font-size: 1rem;
        }

        .btn-wrapper {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn {
            padding: 12px 30px;
            font-weight: 600;
            border-radius: 6px;
            transition: all 0.3s ease;
            border: none;
            font-size: 0.95rem;
        }

        .btn-primary {
            background-color: #3498db;
            color: white;
        }

        .btn-primary:hover {
            background-color: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(52, 152, 219, 0.3);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                width: 200px;
            }

            .main-content {
                margin-left: 200px;
                width: calc(100% - 200px);
                padding: 20px;
            }

            .welcome-container {
                padding: 40px 25px;
                margin: 40px auto;
            }

            .sidebar-nav a {
                padding: 12px 15px;
                font-size: 0.9rem;
            }
        }

        @media (max-width: 576px) {
            .sidebar {
                width: 0;
                transition: width 0.3s ease;
            }

            .sidebar.active {
                width: 200px;
            }

            .main-content {
                margin-left: 0;
                width: 100%;
            }

            .welcome-container {
                padding: 30px 20px;
            }

            .welcome-container h1 {
                font-size: 1.5rem;
            }

            .btn-wrapper {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- Sidebar Navigation -->
    <nav class="sidebar">
        <div class="sidebar-header">
            <div class="flag">🇲🇬</div>
            <h5>Madagascar</h5>
            <p>Titre de Séjour</p>
        </div>
        <ul class="sidebar-nav">
            <li>
                <a href="/" class="active">
                    <i class="fas fa-home"></i>
                    <span>Accueil</span>
                </a>
            </li>
            <li>
                <a href="/formulaire-dossier">
                    <i class="fas fa-file-alt"></i>
                    <span>Nouveau Dossier</span>
                </a>
            </li>
            <li>
                <a href="#" onclick="alert('Fonctionnalité en développement')">
                    <i class="fas fa-folder"></i>
                    <span>Mes Dossiers</span>
                </a>
            </li>
            <li>
                <a href="#" onclick="alert('Fonctionnalité en développement')">
                    <i class="fas fa-chart-bar"></i>
                    <span>Statistiques</span>
                </a>
            </li>
            <li>
                <a href="#" onclick="alert('Fonctionnalité en développement')">
                    <i class="fas fa-cog"></i>
                    <span>Paramètres</span>
                </a>
            </li>
        </ul>
    </nav>

    <!-- Main Content -->
    <div class="main-content">
        <div class="welcome-container">
            <div class="flag">📋</div>
            <h1>Bienvenue</h1>
            <h2>Backoffice - Titre de Séjour</h2>
            <p>Gérez vos demandes de titre de séjour en toute simplicité</p>
            
            <div class="btn-wrapper">
                <a href="/formulaire-dossier" class="btn btn-primary">
                    <i class="fas fa-plus"></i> Créer un Dossier
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
