<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backoffice Titre de Séjour - Madagascar</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .welcome-container {
            background: white;
            border-radius: 15px;
            padding: 50px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            text-align: center;
            max-width: 500px;
        }

        .welcome-container h1 {
            color: #0d6efd;
            margin-bottom: 20px;
            font-weight: 700;
        }

        .welcome-container p {
            color: #6c757d;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        .btn-wrapper {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn {
            padding: 12px 30px;
            font-weight: 600;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #0d6efd, #0dcaf0);
            border: none;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(13, 110, 253, 0.3);
        }

        .flag {
            font-size: 3rem;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="welcome-container">
        <div class="flag">🇲🇬</div>
        <h1>Bienvenue</h1>
        <h2 style="font-size: 1.3rem; color: #212529; margin-bottom: 30px;">
            Backoffice Titre de Séjour
        </h2>
        <p>Système de gestion des demandes de titre de séjour</p>
        
        <div class="btn-wrapper">
            <a href="/formulaire-dossier" class="btn btn-primary">
                📝 Nouveau Dossier
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
